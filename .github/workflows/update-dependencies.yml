name: Update Dependencies

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * MON'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Update dependencies
        id: update
        run: |
          # Update all dependencies
          uv lock --upgrade

          # Check if there are changes
          if git diff --quiet uv.lock; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "All dependencies are already up to date"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Dependencies updated, will create PR"
          fi

      - name: Sync environment with new dependencies
        if: steps.update.outputs.has_changes == 'true'
        run: uv sync

      - name: Run tests
        if: steps.update.outputs.has_changes == 'true'
        run: |
          # Test basic imports
          uv run python -c "import mcp; import pydantic; import httpx; print('✓ Core dependencies import successfully')"
          uv run python -c "import newrelic_mcp.server; print('✓ Server module imports successfully')"

      - name: Run linting
        if: steps.update.outputs.has_changes == 'true'
        run: |
          # Run ruff to ensure code quality is maintained
          uv run ruff check . || echo "⚠️ Linting issues detected (non-blocking)"

      - name: Generate update summary
        if: steps.update.outputs.has_changes == 'true'
        id: summary
        run: |
          # Create a summary of changes
          echo "## Dependency Updates" > update_summary.md
          echo "" >> update_summary.md
          echo "This PR updates all dependencies to their latest versions." >> update_summary.md
          echo "" >> update_summary.md

          # Count and show updates
          UPDATE_COUNT=$(git diff uv.lock | grep -c "^+version" || echo "0")
          echo "**$UPDATE_COUNT packages updated**" >> update_summary.md
          echo "" >> update_summary.md
          echo "### Changes" >> update_summary.md
          echo "\`\`\`" >> update_summary.md
          git diff uv.lock | grep "version = " | head -20 >> update_summary.md || echo "See diff for details" >> update_summary.md
          echo "\`\`\`" >> update_summary.md

          echo "" >> update_summary.md
          echo "### Testing Status" >> update_summary.md
          echo "- Core dependencies import successfully" >> update_summary.md
          echo "- Server module loads without errors" >> update_summary.md
          echo "- Lock file regenerated successfully" >> update_summary.md
          echo "" >> update_summary.md
          echo "---" >> update_summary.md
          echo "*This PR was automatically generated by the Update Dependencies workflow*" >> update_summary.md

      - name: Close superseded update PRs
        if: steps.update.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Unmerged automated PRs accumulate forever otherwise — each week's
          # PR contains everything its predecessors did and more.
          for pr in $(gh pr list --state open --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("deps/automated-update-")) | .number'); do
            gh pr close "$pr" \
              --comment "Superseded by this week's automated dependency update." \
              --delete-branch
          done

      - name: Create Pull Request
        if: steps.update.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and switch to new branch
          BRANCH_NAME="deps/automated-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"

          # Commit changes
          git add uv.lock
          git commit -m "deps: update all dependencies" -m "Automated weekly dependency update"

          # Push branch
          git push origin "$BRANCH_NAME"

          # Create PR using GitHub CLI
          gh pr create \
            --title "deps: Weekly dependency update" \
            --body-file update_summary.md \
            --label dependencies,automated \
            --assignee @me

      - name: No updates needed
        if: steps.update.outputs.has_changes == 'false'
        run: echo "All dependencies are already up to date"
